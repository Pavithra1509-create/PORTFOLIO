<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Restaurant Menu</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>PDH Restaurant</h1>
  </header>

  <div class="menu">
    <div class="section">
      <h2>Starters</h2>
      <div class="item">
        <img src="chicken soup.jpg"width="180px"height="180">chicken soup
        <span class="item-name">chicken Soup</span>
        <span class="item-price">$4.99</span>
      </div>
      <div class="item">
        <img src="pizza.jpg"width="180px">pizza
        <span class="item-name">pizza</span>
        <span class="item-price">$3.49</span>
      </div>
    </div>

    <div class="section">
      <h2>Main Course</h2>
      <div class="item">
        <img src="grilled chicken.jpg"width="200px">Grilled chicken
        <span class="item-name">Grilled Chicken</span>
        <span class="item-price">$10.99</span>
      </div>
      <div class="item">
        <img src="chicken noodles.jpg"width="200px">chicken noodles
        <span class="item-name">chicken noodles</span>
        <span class="item-price">$8.99</span>
      </div>
    </div>

    <div class="section">
      <h2>Desserts</h2>
      <div class="item">
        <img src="chocolate cake.jpg"width="200px"height="180">chocolate cake
        <span class="item-name">Chocolate Cake</span>
        <span class="item-price">$5.99</span>
      </div>
      <div class="item">
        <img src="ice cream.jpg"width="200px">Ice cream
        <span class="item-name">Ice Cream</span>
        <span class="item-price">$3.99</span>
      </div>
    </div>
  </div>
</body>
</html>
