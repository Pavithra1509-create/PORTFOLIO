<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Find Pharmacy</title>
<link rel="stylesheet" href="assets/css/find.css">
 
</head>
<body>

  <header>
  <div class="logo">
    <h1>Pharmacy Stock Locator</h1>
  </div>

  <nav>
    <a href="home.html">Home</a>
    <a href="find.html">Find Medicines</a>
    <a href="staff.html">Staff Login</a>
    <a href="admin.html">Admin Panel</a>
  </nav>

  <!-- Language Selector -->
  <div class="language">
    <label for="language">🌐</label>
    <select id="language" name="language">
      <option value="en">English</option>
      <option value="ta">தமிழ்</option>
      <option value="hi">हिन्दी</option>
      <option value="te">తెలుగు</option>
      <option value="ml">മലയാളം</option>
      <option value="kn">ಕನ್ನಡ</option>
      <option value="bn">বাংলা</option>
      <option value="gu">ગુજરાતી</option>
      <option value="mr">मराठी</option>
      <option value="ur">اردو</option>

      <option value="fr">Français (French)</option>
  <option value="es">Español (Spanish)</option>
  <option value="de">Deutsch (German)</option>
  <option value="zh">中文 (Chinese)</option>
  <option value="ja">日本語 (Japanese)</option>
  <option value="ko">한국어 (Korean)</option>
  <option value="ar">العربية (Arabic)</option>
  <option value="ru">Русский (Russian)</option>
    </select>
  </div>
</header>


  <div class="container">
    <h2>🔍 Find Pharmacy</h2>

    <!-- Pharmacy Search Row -->
    <div class="pharmacy-item">
      <input type="text" id="medicineInput" placeholder="Enter medicine / pharmacy name">
      <button class="btn mic-btn" id="micBtn">🎤</button>
      <button class="btn" id="searchBtn">Search</button>
    </div>

    <!-- Results after clicking search -->
    <div id="results"></div>
  </div>

  <script>
    const searchBtn = document.getElementById("searchBtn");
    const micBtn = document.getElementById("micBtn");
    const medicineInput = document.getElementById("medicineInput");
    const resultsDiv = document.getElementById("results");

    // 🎤 Voice recognition setup
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRecognition) {
      const recognition = new SpeechRecognition();
      recognition.lang = "en-US";

      micBtn.addEventListener("click", () => {
        recognition.start();
      });

      recognition.onresult = (event) => {
        medicineInput.value = event.results[0][0].transcript;
      };
    } else {
      micBtn.disabled = true;
      micBtn.innerText = "🎤 Not supported";
    }

    // Search click → show results
    searchBtn.addEventListener("click", () => {
      const medicine = medicineInput.value.trim();
      if (medicine === "") {
        alert("Please enter or speak a medicine name!");
        return;
      }

      // Example pharmacies (replace with DB later)
      const pharmacies = ["Apollo Pharmacy", "MedPlus", "HealthCare Medicals"];
      
      // Show pharmacy list with Get Location button
      resultsDiv.innerHTML = pharmacies.map(name => `
        <div class="pharmacy-item">
          <input type="text" value="${name}" readonly>
          <button class="btn get-location" onclick="goToMap('${name}')">Get Location</button>
        </div>
      `).join("");
    });

    // Redirect to map page
    function goToMap(pharmacyName) {
      window.location.href = `map.html?pharmacy=${encodeURIComponent(pharmacyName)}`;
    }
  </script>
</body>
</html>
