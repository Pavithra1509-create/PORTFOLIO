<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Login - Pharmacy Stock Locator</title>
  <link rel="stylesheet" href="assets/css/staff.css">
</head>
<body>

  <!-- Header -->
  <header>
    <div class="logo">
      <h1>Pharmacy Stock Locator</h1>
    </div>

    <nav>
      <a href="home.html">Home</a>
      <a href="find.html">Find Medicines</a>
      <a href="staff.html" class="active">Staff Login</a>
      <a href="admin.html">Admin Panel</a>
    </nav>

    <div class="language">
      <select id="language" name="language">
        <option value="en">English</option>
        <option value="ta">தமிழ்</option>
        <option value="hi">हिन्दी</option>
        <option value="te">తెలుగు</option>
        <option value="ml">മലയാളം</option>
        <option value="kn">ಕನ್ನಡ</option>
        <option value="bn">বাংলা</option>
        <option value="gu">ગુજરાતી</option>
        <option value="mr">मराठी</option>
        <option value="ur">اردو</option>
        <option value="fr">Français</option>
        <option value="es">Español</option>
        <option value="de">Deutsch</option>
        <option value="zh">中文</option>
        <option value="ja">日本語</option>
        <option value="ko">한국어</option>
        <option value="ar">العربية</option>
        <option value="ru">Русский</option>
      </select>
    </div>
  </header>

  <!-- Main Section -->
  <main class="login-container">
    <div class="login-card">
      <h2>👩‍⚕️ Staff Login</h2>
      <p class="subtitle">Please enter your credentials</p>

      <form id="staffLoginForm">
        <input type="text" id="staffUsername" placeholder="Username" required>
        <input type="password" id="staffPassword" placeholder="Password" required>
        <button type="submit">Login</button>
      </form>

      <div id="loginMessage" class="message"></div>
    </div>
  </main>



  <script>
    const form = document.getElementById("staffLoginForm");
    const messageDiv = document.getElementById("loginMessage");

    form.addEventListener("submit", (e) => {
      e.preventDefault();

      const username = document.getElementById("staffUsername").value.trim();
      const password = document.getElementById("staffPassword").value.trim();

      // Dummy validation (replace later with backend API)
      if(username === "staff" && password === "1234"){
        messageDiv.style.color = "green";
        messageDiv.innerHTML = "✅ Login successful. Redirecting...";
        setTimeout(() => {
          window.location.href = "staff_dashboard.html"; // placeholder
        }, 1500);
      } else {
        messageDiv.style.color = "red";
        messageDiv.innerHTML = "❌ Invalid username or password.";
      }
    });
  </script>

</body>
</html>
